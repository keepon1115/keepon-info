<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>テンプレート一覧｜キープオン HP制作</title>
<meta name="description" content="保育園・幼稚園・教室向けのテンプレートを複数ご用意。選ぶだけで最短1週間でホームページが完成。" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="template" data-title="テンプレート一覧" data-eyebrow="TEMPLATE">
<main>
  <section class="section">
    <div class="container">
      <p class="lead-block reveal">お好みのテンプレートを選んで、テキストと写真を送るだけ。<br>最短1週間で、あなたの園のホームページが完成します。</p>

      <div class="filter-bar reveal" id="tplFilter">
        <button class="filter-btn is-active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="natural">やわらか・ナチュラル</button>
        <button class="filter-btn" data-filter="pop">元気・ポップ</button>
        <button class="filter-btn" data-filter="trust">落ち着き・信頼</button>
      </div>

      <div class="card-grid" id="tplGrid">
        <article class="gcard reveal" data-cat="natural">
          <div class="gcard__thumb"><figure class="img-ph img-ph--cover"><!-- 画像差し替え: assets/images/templates/tpl-natural-01.jpg --><span class="img-ph__ico">🌿</span><span class="img-ph__label">テンプレSS（ナチュラル）</span><span class="img-ph__size">推奨 800×500px</span><span class="img-ph__path">assets/images/templates/tpl-natural-01.jpg</span></figure></div>
          <div class="gcard__body"><div class="gcard__tags"><span class="chip">やわらか・ナチュラル</span></div><h3>こもれび</h3><a href="#" class="gcard__link" target="_blank" rel="noopener">プレビューを見る →</a></div>
        </article>
        <article class="gcard reveal" data-cat="natural">
          <div class="gcard__thumb"><figure class="img-ph img-ph--cover"><!-- 画像差し替え: assets/images/templates/tpl-natural-02.jpg --><span class="img-ph__ico">🌼</span><span class="img-ph__label">テンプレSS（ナチュラル）</span><span class="img-ph__size">推奨 800×500px</span><span class="img-ph__path">assets/images/templates/tpl-natural-02.jpg</span></figure></div>
          <div class="gcard__body"><div class="gcard__tags"><span class="chip">やわらか・ナチュラル</span></div><h3>はなのね</h3><a href="#" class="gcard__link" target="_blank" rel="noopener">プレビューを見る →</a></div>
        </article>
        <article class="gcard reveal" data-cat="pop">
          <div class="gcard__thumb"><figure class="img-ph img-ph--cover"><!-- 画像差し替え: assets/images/templates/tpl-pop-01.jpg --><span class="img-ph__ico">🎈</span><span class="img-ph__label">テンプレSS（ポップ）</span><span class="img-ph__size">推奨 800×500px</span><span class="img-ph__path">assets/images/templates/tpl-pop-01.jpg</span></figure></div>
          <div class="gcard__body"><div class="gcard__tags"><span class="chip chip--accent">元気・ポップ</span></div><h3>わくわく</h3><a href="#" class="gcard__link" target="_blank" rel="noopener">プレビューを見る →</a></div>
        </article>
        <article class="gcard reveal" data-cat="pop">
          <div class="gcard__thumb"><figure class="img-ph img-ph--cover"><!-- 画像差し替え: assets/images/templates/tpl-pop-02.jpg --><span class="img-ph__ico">🌈</span><span class="img-ph__label">テンプレSS（ポップ）</span><span class="img-ph__size">推奨 800×500px</span><span class="img-ph__path">assets/images/templates/tpl-pop-02.jpg</span></figure></div>
          <div class="gcard__body"><div class="gcard__tags"><span class="chip chip--accent">元気・ポップ</span></div><h3>にじいろ</h3><a href="#" class="gcard__link" target="_blank" rel="noopener">プレビューを見る →</a></div>
        </article>
        <article class="gcard reveal" data-cat="trust">
          <div class="gcard__thumb"><figure class="img-ph img-ph--cover"><!-- 画像差し替え: assets/images/templates/tpl-trust-01.jpg --><span class="img-ph__ico">🏛️</span><span class="img-ph__label">テンプレSS（信頼）</span><span class="img-ph__size">推奨 800×500px</span><span class="img-ph__path">assets/images/templates/tpl-trust-01.jpg</span></figure></div>
          <div class="gcard__body"><div class="gcard__tags"><span class="chip chip--accent">落ち着き・信頼</span></div><h3>みのり</h3><a href="#" class="gcard__link" target="_blank" rel="noopener">プレビューを見る →</a></div>
        </article>
        <article class="gcard reveal" data-cat="trust">
          <div class="gcard__thumb"><figure class="img-ph img-ph--cover"><!-- 画像差し替え: assets/images/templates/tpl-trust-02.jpg --><span class="img-ph__ico">📘</span><span class="img-ph__label">テンプレSS（信頼）</span><span class="img-ph__size">推奨 800×500px</span><span class="img-ph__path">assets/images/templates/tpl-trust-02.jpg</span></figure></div>
          <div class="gcard__body"><div class="gcard__tags"><span class="chip chip--accent">落ち着き・信頼</span></div><h3>あおぞら</h3><a href="#" class="gcard__link" target="_blank" rel="noopener">プレビューを見る →</a></div>
        </article>
      </div>
    </div>
  </section>

  <section class="final-cta cta-band">
    <div class="container reveal">
      <h2 class="final-cta__title">気になるテンプレートはありましたか？</h2>
      <p class="final-cta__sub">「これにしたい」「どれが合うか相談したい」、どちらでもOK。</p>
      <div class="final-cta__actions">
        <a href="#" data-line-btn class="btn btn--line btn--lg"><span class="ico-line"></span>LINEで相談する</a>
        <a href="contact.html" class="btn btn--ghost-white btn--lg">フォームで問い合わせ <span class="arr">→</span></a>
      </div>
    </div>
  </section>
</main>
<script src="assets/js/config.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/diagnosis.js"></script>
<script src="assets/js/main.js"></script>
<script>
/* テンプレートのカテゴリフィルタ */
(function () {
  var bar = document.getElementById("tplFilter");
  var cards = document.querySelectorAll("#tplGrid .gcard");
  bar.addEventListener("click", function (e) {
    var btn = e.target.closest(".filter-btn");
    if (!btn) return;
    bar.querySelectorAll(".filter-btn").forEach(function (b) { b.classList.remove("is-active"); });
    btn.classList.add("is-active");
    var f = btn.getAttribute("data-filter");
    cards.forEach(function (c) {
      c.style.display = (f === "all" || c.getAttribute("data-cat") === f) ? "" : "none";
    });
  });
})();
</script>
</body>
</html>
